daemon on
log_file /var/log/motion/motion.log
log_level 6
pid_file /var/run/motion/motion.pid

video_device /dev/video0
video_params palette=8
width 1280
height 720
framerate 15

threshold 800
minimum_motion_frames 3
noise_tune on
despeckle_filter EedDl
lightswitch_percent 75
event_gap 30

picture_output best
picture_filename %Y-%m-%d/%H%M%S-%q
target_dir /var/lib/motion

movie_output on
movie_max_time 60
movie_quality 45
movie_codec mkv
movie_filename %Y-%m-%d/%H%M%S

timelapse_interval 60
timelapse_mode daily
timelapse_filename %Y-%m-%d-timelapse

stream_port 8081
stream_quality 60
stream_maxrate 15
stream_localhost off
stream_auth_method 0

webcontrol_port 8080
webcontrol_localhost off
webcontrol_auth_method 0

on_event_start /opt/hummingbird-cam/notify.sh event_start
on_picture_save /opt/hummingbird-cam/notify.sh picture_save %f
on_event_end /opt/hummingbird-cam/notify.sh event_end
