# motion.conf — hummingbird nest cam
# Tuned for Pi Zero 2 W + Logitech C615

############################################################
# Daemon
############################################################
daemon on
log_file /var/log/motion/motion.log
log_level 6
pid_file /var/run/motion/motion.pid

############################################################
# Video Device
############################################################
video_device /dev/video0
# video_params combines v4l2_palette, input, norm for motion 4.5+
# Palette 8 = MJPG — hardware-compressed by the C615, less CPU on the Pi
video_params palette=8

# Resolution — 640x480 is the sweet spot for Pi Zero 2 W
# C615 supports 1080p but the CPU can't handle it
width 640
height 480
framerate 10

############################################################
# Motion Detection
############################################################
# Threshold: number of changed pixels to trigger motion
# Hummingbirds are tiny — lower threshold catches them
# Default is 1500, we use 500 for small bird sensitivity
threshold 500

# Minimum frames with motion before triggering an event
# Filters out single-frame noise (wind, shadows)
minimum_motion_frames 3

# Noise tuning — auto-tune to lighting conditions
noise_tune on

# Despeckle filter — removes isolated noise pixels
# E = erode, d = dilate (EedDl is a good general filter)
despeckle_filter EedDl

# Lightswitch — ignore sudden global brightness changes
# (clouds passing, porch light on/off)
# Percentage of frame that must change to trigger lightswitch
lightswitch_percent 75

# Gap between motion events (seconds)
# If no motion for this long, current event ends
event_gap 30

############################################################
# Image Output
############################################################
# Save snapshot on motion
picture_output best

# Picture filename pattern — date/time stamped
picture_filename %Y-%m-%d/%H%M%S-%q

# Target directory for snapshots and videos
target_dir /var/lib/motion

############################################################
# Video Output
############################################################
# Save short clips of motion events
movie_output on
movie_max_time 60
movie_quality 45
movie_codec mkv
movie_filename %Y-%m-%d/%H%M%S

############################################################
# Timelapse (optional — great for nest activity overview)
############################################################
# Capture one frame every 60 seconds into a daily timelapse
timelapse_interval 60
timelapse_mode daily
timelapse_filename %Y-%m-%d-timelapse

############################################################
# Live Stream
############################################################
# MJPEG stream on port 8081
stream_port 8081
stream_quality 60
stream_maxrate 10
stream_localhost off
stream_auth_method 0

# Web control interface on port 8080
webcontrol_port 8080
webcontrol_localhost off
webcontrol_auth_method 0

############################################################
# External Commands — Notifications
############################################################
# Called when a motion event starts (first motion frame)
on_event_start /opt/hummingbird-cam/notify.sh event_start

# Called when a picture is saved (sends the image with notification)
on_picture_save /opt/hummingbird-cam/notify.sh picture_save %f

# Called when a motion event ends
on_event_end /opt/hummingbird-cam/notify.sh event_end
